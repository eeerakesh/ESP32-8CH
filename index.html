<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Relay Control - RAKESH VEMURI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { font-family: 'Segoe UI', sans-serif; text-align: center; background-color: #f0f2f5; margin: 0; padding: 20px; }
    h1 { color: #333; }
    #dashboard { display: none; }
    .relay-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; }
    .relay-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 260px; transition: all 0.3s; }
    .relay-card.scheduled { border-left: 5px solid #4CAF50; }
    .toggle-btn { width: 100%; padding: 12px; border: none; border-radius: 8px; color: white; cursor: pointer; font-weight: bold; margin-bottom: 15px; transition: 0.3s; }
    .scheduler { border-top: 1px solid #eee; padding-top: 15px; text-align: left; margin-top:10px; }
    .scheduler label { font-size: 0.85rem; font-weight: bold; color: #555; display:block; margin-top:8px; }
    .scheduler input[type="time"], .scheduler input[type="date"] { width: 100%; padding: 8px; margin: 5px 0 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
    .scheduler input[type="time"]:focus, .scheduler input[type="date"]:focus { outline: 2px solid #1e88e5; }
    .prev-schedule { background: #f9f9f9; padding: 8px; margin-top: 8px; border-radius: 5px; font-size:0.8rem; color:#333; }
    .auto-date-btn { background: #4CAF50; color: white; border: none; border-radius: 3px; padding: 3px 6px; font-size: 0.7rem; cursor: pointer; margin-left: 5px; }
    #loginForm { max-width: 350px; margin: 80px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    #loginForm input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    #loginBtn { width: 100%; padding: 12px; background: #1e88e5; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    #loginBtn:hover { background: #1565c0; }
    .reset-btn { width:100%; padding:8px; margin-top:5px; border:none; border-radius:5px; background:#ff5555; color:white; cursor:pointer; font-size:0.85rem; }
    .reset-btn:hover { background: #ff3333; }
    .status-badge { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 0.75rem; margin-left: 5px; }
    .status-active { background: #4CAF50; color: white; }
    .status-inactive { background: #f44336; color: white; }
    .countdown-timer { font-size: 0.8rem; color: #d32f2f; margin-top: 5px; min-height: 40px; font-weight: bold; line-height: 1.4; }
    footer { margin-top: 40px; color: #888; font-weight: bold; padding-bottom: 40px; }
    @media(max-width:480px){ .relay-card{width:90%;} }
    .notification { position: fixed; top: 20px; right: 20px; background: #333; color: white; padding: 12px 20px; border-radius: 8px; display: none; z-index: 1000; }
    .notification.show { display: block; animation: slideIn 0.3s; }
    @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    .info-text { font-size: 0.75rem; color: #666; margin-top: 5px; font-style: italic; }
  </style>
</head>
<body>

  <h1>Relay Dashboard</h1>
  <div id="notification" class="notification"></div>

  <div id="loginForm">
    <h3>Authentication</h3>
    <input type="email" id="email" placeholder="Email" value="eee.rakesh@gmail.com" />
    <input type="password" id="password" placeholder="Password" />
    <button id="loginBtn">Login</button>
    <div class="info-text">Schedules only run on selected date (no auto-repeat)</div>
  </div>

  <div id="dashboard">
    <div style="margin-bottom: 15px;">
      <span id="currentDateTime" style="font-size: 1.1rem; color: #333; background: #e3f2fd; padding: 8px 15px; border-radius: 20px;"></span>
    </div>
    <div class="relay-container" id="relayContainer"></div>
    <div style="margin-top: 30px;">
      <button onclick="logout()" style="padding:10px 20px; background:#444; color:white; border:none; border-radius:5px; cursor:pointer;">Logout</button>
    </div>
    <div class="info-text" style="margin-top: 20px;">⏰ Schedules are one-time only. Select a future date to schedule.</div>
  </div>

  <footer>Created by RAKESH VEMURI</footer>

  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAxKfIWJbyHc5YSjfc5KNW5suoD75ekDbE",
      authDomain: "esp32-8ch-relay.firebaseapp.com",
      databaseURL: "https://esp32-8ch-relay-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "esp32-8ch-relay",
      storageBucket: "esp32-8ch-relay.firebasestorage.app",
      messagingSenderId: "162489388504",
      appId: "1:162489388504:web:8eb9ffff6cfcce445876ad"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const relayList = [1,2,3,4,5,6,7,8];
    const container = document.getElementById('relayContainer');
    let countdownTimers = {};
    let notificationTimeout;

    function showNotification(message, type = 'info') {
      const notification = document.getElementById('notification');
      notification.textContent = message;
      notification.style.backgroundColor = type === 'success' ? '#4CAF50' : '#f44336';
      notification.classList.add('show');
      
      if (notificationTimeout) clearTimeout(notificationTimeout);
      notificationTimeout = setTimeout(() => {
        notification.classList.remove('show');
      }, 3000);
    }

    function getCurrentDateTime() {
      const now = new Date();
      const date = now.toISOString().split('T')[0];
      const time = now.toTimeString().split(' ')[0].substring(0,5);
      return { date, time, now };
    }

    function updateCurrentTime() {
      const { date, time } = getCurrentDateTime();
      document.getElementById('currentDateTime').innerHTML = `📅 ${date} | ⏰ ${time}`;
    }
    setInterval(updateCurrentTime, 1000);

    function setDateToToday(elementId) {
      const { date } = getCurrentDateTime();
      document.getElementById(elementId).value = date;
      showNotification(`Date set to ${date}`, 'success');
    }

    // Generate relay cards
    relayList.forEach(num => {
      container.innerHTML += `
        <div class="relay-card" id="card${num}">
          <h2 style="margin:0; color:#1e88e5;">Relay ${num}</h2>
          <p>Status: <span id="status${num}" style="font-weight:bold">--</span> 
             <span id="badge${num}" class="status-badge"></span></p>
          <button class="toggle-btn" id="btn${num}">Toggle</button>
          <div class="scheduler">
            <label style="display: flex; align-items: center;">
              <input type="checkbox" id="schedActive${num}"> Enable Schedule
            </label>
            <label>Date 
              <button class="auto-date-btn" onclick="setDateToToday('schedDate${num}')">Today</button>
            </label>
            <input type="date" id="schedDate${num}">
            <label>ON Time:</label>
            <input type="time" id="onTime${num}">
            <label>OFF Time:</label>
            <input type="time" id="offTime${num}">
            <button class="reset-btn" id="reset${num}">Reset Schedule</button>
            <div class="prev-schedule" id="prev${num}">Previous: --</div>
            <div class="countdown-timer" id="countdown${num}"></div>
          </div>
        </div>
      `;
    });

    // Auto-login
    window.onload = () => {
      updateCurrentTime();
      const storedEmail = localStorage.getItem('email');
      const storedPass = localStorage.getItem('password');
      if(storedEmail && storedPass) {
        login(storedEmail, storedPass, true);
      }
    };

    document.getElementById("loginBtn").onclick = () => {
      const email = document.getElementById("email").value;
      const pass = document.getElementById("password").value;
      login(email, pass, false);
    };

    function login(email, pass, auto = false){
      firebase.auth().signInWithEmailAndPassword(email, pass)
        .then(() => {
          localStorage.setItem('email', email);
          localStorage.setItem('password', pass);
          document.getElementById("loginForm").style.display = "none";
          document.getElementById("dashboard").style.display = "block";
          initDashboard();
          if (!auto) showNotification('Login successful!', 'success');
        }).catch(err => {
          alert(err.message);
          if (auto) {
            localStorage.removeItem('email');
            localStorage.removeItem('password');
          }
        });
    }

    function logout(){
      firebase.auth().signOut().then(()=>{
        localStorage.removeItem('email');
        localStorage.removeItem('password');
        location.reload();
      });
    }

    // FIXED: Only shows future ON times that are explicitly set by user
    function updateCountdown(relayId, scheduleData) {
      const countdownEl = document.getElementById(`countdown${relayId}`);
      if (!countdownEl) return;

      // Only proceed if schedule is ACTIVE and has BOTH times
      if (!scheduleData || 
          scheduleData.active !== true || 
          !scheduleData.on || 
          !scheduleData.off || 
          scheduleData.on === "" || 
          scheduleData.off === "") {
        countdownEl.innerHTML = '';
        return;
      }

      try {
        const now = new Date();
        const today = now.toISOString().split('T')[0];
        
        // Use schedule date if provided, otherwise use today
        const scheduleDate = scheduleData.date || today;
        
        // Create date object for ON time on the schedule date
        let onTime = new Date(`${scheduleDate}T${scheduleData.on}:00`);
        
        // Validate date
        if (isNaN(onTime.getTime())) {
          countdownEl.innerHTML = '';
          return;
        }
        
        // Check if the schedule date is in the future
        const scheduleDateObj = new Date(scheduleDate + 'T00:00:00');
        const todayObj = new Date(today + 'T00:00:00');
        const isFutureDate = scheduleDateObj > todayObj;
        const isPastDate = scheduleDateObj < todayObj;
        
        // If it's a past date, don't show countdown
        if (isPastDate) {
          countdownEl.innerHTML = '';
          return;
        }
        
        let nextOnTime = null;
        
        if (isFutureDate) {
          // Future date - ON time is in the future
          nextOnTime = onTime;
        } else {
          // Today - check if ON time is in the future
          if (onTime > now) {
            nextOnTime = onTime;
          } else {
            // ON time has passed for today
            // DO NOT automatically assume tomorrow
            // Only show if user explicitly selected a future date
            countdownEl.innerHTML = '';
            return;
          }
        }
        
        // If no next ON time found, hide countdown
        if (!nextOnTime) {
          countdownEl.innerHTML = '';
          return;
        }
        
        const timeUntil = nextOnTime - now;
        
        // Show countdown for any future ON time
        if (timeUntil > 0) {
          const days = Math.floor(timeUntil / (1000 * 60 * 60 * 24));
          const hours = Math.floor((timeUntil % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
          const minutes = Math.floor((timeUntil % (1000 * 60 * 60)) / (1000 * 60));
          const seconds = Math.floor((timeUntil % (1000 * 60)) / 1000);
          
          let countdownText = '🔴 Next ON in ';
          
          // Smart formatting for long durations
          if (days > 365) {
            const years = Math.floor(days / 365);
            const remainingDays = days % 365;
            countdownText += `${years}y ${remainingDays}d `;
          } else if (days > 30) {
            const months = Math.floor(days / 30);
            const remainingDays = days % 30;
            countdownText += `${months}mo ${remainingDays}d `;
          } else if (days > 0) {
            countdownText += `${days}d `;
          }
          
          countdownText += `${hours}h ${minutes}m ${seconds}s`;
          
          // Format the date nicely
          const eventDate = nextOnTime.toLocaleDateString('en-US', {
            year: 'numeric',
            month: 'short',
            day: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
          });
          
          countdownEl.innerHTML = `${countdownText}<br><span style="font-size:0.7rem; color:#666;">on ${eventDate}</span>`;
        } else {
          countdownEl.innerHTML = '';
        }
      } catch (error) {
        console.log('Countdown error:', error);
        countdownEl.innerHTML = '';
      }
    }

    function initDashboard(){
      relayList.forEach(id => {
        const relayRef = db.ref(`relay${id}`);
        const schedRef = db.ref(`sched/relay${id}`);

        const prevDiv = document.getElementById(`prev${id}`);
        const card = document.getElementById(`card${id}`);
        const badge = document.getElementById(`badge${id}`);

        // Sync relay status
        relayRef.on("value", snap => {
          const isOn = snap.val();
          const btn = document.getElementById(`btn${id}`);
          const statusSpan = document.getElementById(`status${id}`);
          statusSpan.innerText = isOn ? "ON" : "OFF";
          statusSpan.style.color = isOn ? "#2e7d32" : "#d32f2f";
          btn.style.backgroundColor = isOn ? "#4CAF50" : "#2196F3";
          btn.innerText = isOn ? "Turn OFF" : "Turn ON";
        });

        // Load schedules
        schedRef.on("value", snap => {
          const data = snap.val();
          
          // Clear any existing countdown timer
          if (countdownTimers[id]) {
            clearInterval(countdownTimers[id]);
            delete countdownTimers[id];
          }
          
          // Clear countdown display immediately
          document.getElementById(`countdown${id}`).innerHTML = '';
          
          if(data){
            document.getElementById(`schedActive${id}`).checked = data.active || false;
            document.getElementById(`onTime${id}`).value = data.on || "";
            document.getElementById(`offTime${id}`).value = data.off || "";
            document.getElementById(`schedDate${id}`).value = data.date || getCurrentDateTime().date;
            
            prevDiv.innerHTML = `📋 Prev: ${data.active ? '✅ ON' : '❌ OFF'}, ON:${data.on||'--'}, OFF:${data.off||'--'}, Date:${data.date||'--'}`;
            
            // Check if schedule is valid
            const hasValidSchedule = data.active === true && data.on && data.off && data.on !== "" && data.off !== "";
            
            if (hasValidSchedule) {
              card.classList.add('scheduled');
              badge.className = 'status-badge status-active';
              badge.innerHTML = 'Scheduled';
              
              // Initial countdown update
              updateCountdown(id, data);
              
              // Set up countdown timer only for active schedules
              countdownTimers[id] = setInterval(() => {
                updateCountdown(id, data);
              }, 1000);
            } else {
              card.classList.remove('scheduled');
              badge.className = 'status-badge status-inactive';
              badge.innerHTML = 'No Schedule';
            }
          } else {
            prevDiv.innerHTML = "📋 Previous: No schedule";
            card.classList.remove('scheduled');
            badge.className = 'status-badge status-inactive';
            badge.innerHTML = 'No Schedule';
          }
        });

        // Update schedule
        const updateSchedule = () => {
          const activeVal = document.getElementById(`schedActive${id}`).checked;
          let onVal = document.getElementById(`onTime${id}`).value;
          let offVal = document.getElementById(`offTime${id}`).value;
          let dateVal = document.getElementById(`schedDate${id}`).value;
          
          if (!dateVal) {
            dateVal = getCurrentDateTime().date;
            document.getElementById(`schedDate${id}`).value = dateVal;
          }
          
          const updates = {};
          updates[`sched/relay${id}/on`] = onVal || "";
          updates[`sched/relay${id}/off`] = offVal || "";
          updates[`sched/relay${id}/active`] = activeVal;
          updates[`sched/relay${id}/date`] = dateVal;
          
          db.ref().update(updates)
            .then(() => {
              if (activeVal && onVal && offVal) {
                showNotification(`Relay ${id} schedule activated!`, 'success');
              } else {
                showNotification(`Relay ${id} schedule updated`, 'info');
              }
            })
            .catch(err => showNotification('Error updating schedule', 'error'));
        };

        let timeoutId;
        const debouncedUpdate = () => {
          if (timeoutId) clearTimeout(timeoutId);
          timeoutId = setTimeout(updateSchedule, 500);
        };

        document.getElementById(`schedActive${id}`).onchange = debouncedUpdate;
        document.getElementById(`onTime${id}`).onchange = debouncedUpdate;
        document.getElementById(`offTime${id}`).onchange = debouncedUpdate;
        document.getElementById(`schedDate${id}`).onchange = debouncedUpdate;

        // Manual toggle
        document.getElementById(`btn${id}`).onclick = () => {
          relayRef.once('value').then(snap => {
            const newState = !snap.val();
            relayRef.set(newState)
              .then(() => showNotification(`Relay ${id} turned ${newState ? 'ON' : 'OFF'}!`, 'success'));
          });
        };

        // Reset schedule
        document.getElementById(`reset${id}`).onclick = () => {
          document.getElementById(`schedActive${id}`).checked = false;
          document.getElementById(`onTime${id}`).value = "";
          document.getElementById(`offTime${id}`).value = "";
          document.getElementById(`schedDate${id}`).value = getCurrentDateTime().date;
          
          db.ref(`sched/relay${id}`).set({
            active: false, 
            on: "", 
            off: "", 
            date: getCurrentDateTime().date
          }).then(() => {
            showNotification(`Relay ${id} schedule reset!`, 'success');
            document.getElementById(`countdown${id}`).innerHTML = '';
          });
        };
      });
    }
  </script>
</body>
</html>
